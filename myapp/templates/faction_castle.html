<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ faction.castle_name }} — {{ faction.name }} qal'asi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --accent: {{ faction.color }};
    --bg-dark:#0b0d0a; --bg-panel:#12160f;
    --ink:#e6e0cf; --ink-dim:#a89f8a; --line: rgba(201,163,78,.35);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:
      radial-gradient(ellipse at top, color-mix(in srgb, var(--accent) 18%, #14170f) 0%, var(--bg-dark) 65%);
    color:var(--ink); font-family:'Cormorant Garamond', serif; font-size:19px; line-height:1.7;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px;
  }
  h1,.brand{ font-family:'Cinzel', serif; letter-spacing:.04em; }
  .card{
    background:var(--bg-panel); border:1px solid var(--accent); box-shadow:0 0 40px color-mix(in srgb, var(--accent) 25%, transparent);
    max-width:760px; width:100%; padding:44px; text-align:center;
  }
  .eyebrow{
    font-family:'Cinzel',serif; font-size:.72rem; letter-spacing:.14em; text-transform:uppercase;
    color:var(--accent); margin-bottom:10px;
  }
  h1{ color:var(--ink); font-size:2rem; margin-bottom:26px; }
  .castle-frame{
    width:100%; aspect-ratio:16/10; border:2px solid var(--accent); overflow:hidden;
    box-shadow:0 0 34px color-mix(in srgb, var(--accent) 40%, transparent);
    display:flex; align-items:center; justify-content:center;
    background:#0e120c; margin-bottom:30px;
  }
  .castle-frame img{ width:100%; height:100%; object-fit:cover; display:block; }
  .castle-placeholder{ color:var(--ink-dim); font-style:italic; font-size:.95rem; padding:20px; }
  .actions{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
  .btn{
    border:1px solid var(--accent); background:color-mix(in srgb, var(--accent) 12%, transparent); color:var(--ink);
    padding:12px 22px; font-family:'Cinzel',serif; font-size:.78rem; letter-spacing:.12em; text-transform:uppercase;
    text-decoration:none; transition:.2s; display:inline-block;
  }
  .btn:hover{ background:var(--accent); color:#141810; }
  .btn.ghost{ background:transparent; color:var(--ink-dim); border-color:var(--line); }
  .btn.ghost:hover{ color:var(--ink); border-color:var(--accent); }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">{{ faction.name }} — asosiy qal'a</div>
    <h1>{{ faction.castle_name }}</h1>

    <div class="castle-frame">
      <img src="/media/{{ faction.castle_image }}" alt="{{ faction.castle_name }}"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <div class="castle-placeholder" style="display:none;">Rasm hali qo'yilmagan — media/{{ faction.castle_image }} fayliga rasm joylang.</div>
    </div>

    <div class="actions">
      <a href="{% url 'faction_detail' slug %}" class="btn ghost">← {{ faction.name }} sahifasiga qaytish</a>
    </div>
  </div>
</body>
</html>
